name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # Both runners on purpose: the script carries BSD/GNU dual paths for
    # date/stat, and only macOS exercises the BSD branches.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y jq shellcheck bats

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install bats-core shellcheck jq || true

      - name: shellcheck
        run: shellcheck statusline.sh doctor.sh install.sh

      - name: bats
        run: bats tests/
